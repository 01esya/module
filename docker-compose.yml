version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - .env
    volumes:
      # Монтирование собранной статики фронтенда (директория dist в корне проекта)
      - ./dist:/app/dist
      # Монтирование тома для сохранения данных SQLite БД
      - cargoflow_data:/app/data
    environment:
      - APP_ENV=production
      - SQLITE_DB_PATH=/app/data/cargoflow.db
    restart: unless-stopped

volumes:
  cargoflow_data:
